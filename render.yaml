# Render Blueprint – SPA React/Vite (dashmidias)
# https://render.com/docs/blueprint-spec
#
# A app usa HashRouter: convites e rotas ficam em /#/... (só o pedido GET / é necessário).
# Reescrita /* → /index.html continua útil para links antigos sem hash ou rotas “bonitas” no futuro.
# Se criou o site estático à mão: Dashboard → Redirects/Rewrites → /* → /index.html (Rewrite).
#
# Alternativa (Web Service em vez de Static): buildCommand igual + startCommand:
#   cd frontend && npx --yes serve@14 -s dist -l tcp://0.0.0.0:$PORT
# (o pacote "serve" com -s aplica fallback SPA sem regras no painel).
#
# As variáveis abaixo (sync: false) têm de ser preenchidas no painel do serviço
# (Settings → Environment) ANTES de confiar no build: o Vite embute VITE_* em `npm run build`.
# Supabase: no dashboard Auth → URL Configuration, inclua a URL pública do Render
# (ex.: https://dashmidias-web.onrender.com) em Site URL e Redirect URLs.

services:
  - type: web
    name: dashmidias-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /cadastro/*
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_REPORT_SLUG
        sync: false
      - key: VITE_HUB_OWNER_EMAIL
        sync: false
      - key: VITE_CNPJA_API_KEY
        sync: false
