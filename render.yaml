# Render Blueprint – SPA React/Vite (dashmidias)
# https://render.com/docs/blueprint-spec
#
# Após conectar o repositório: defina no painel (Environment) os build-time vars:
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_REPORT_SLUG
# O Vite só incorpora VITE_* no bundle durante `npm run build`.

services:
  - type: web
    name: dashmidias-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
